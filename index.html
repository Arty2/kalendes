<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>/kalendes</title>
    <link rel="stylesheet" href="/styles/global.css" />
    <!-- Paint the saved (or device-resolved) flavor + scheme before first paint,
         so the page background and Android status-bar (theme-color) match the
         theme from frame 1 instead of flashing the bare :root white. Setting the
         data-* attributes here means the render-blocking app CSS applies already
         themed. The PAPER map mirrors the flavor blocks in styles/global.css —
         keep it in sync — and is used for theme-color because Vite injects the
         bundled CSS after this script, so getComputedStyle('--paper-color') isn't
         available yet in the build (it's preferred when it is, e.g. in dev).
         src/App.svelte re-sets the same attributes idempotently once mounted. -->
    <script>
      (function () {
        // Light / dark --paper-color per flavor; mirror of styles/global.css.
        var PAPER = {
          pepper: { light: '#ffffff', dark: '#0d0d0e' },
          juniper: { light: '#ddeeff', dark: '#1f2630' },
          bergamot: { light: '#f1ebe2', dark: '#161110' },
          rose: { light: '#ffd2e6', dark: '#141414' },
          cinnamon: { light: '#e3dedb', dark: '#2b0000' },
          sage: { light: '#c9cfc9', dark: '#313631' },
        };
        try {
          var cfg = JSON.parse(localStorage.getItem('calendar-timeline:config') || 'null');
          var scheme = (cfg && cfg.scheme) || 'auto';
          var palette = (cfg && cfg.palette) || 'pepper';
          if (scheme === 'auto')
            scheme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var r = document.documentElement;
          r.setAttribute('data-scheme', scheme);
          r.setAttribute('data-palette', palette);
          var paper =
            getComputedStyle(r).getPropertyValue('--paper-color').trim() ||
            (PAPER[palette] || PAPER.pepper)[scheme] ||
            '#ffffff';
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', paper);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
